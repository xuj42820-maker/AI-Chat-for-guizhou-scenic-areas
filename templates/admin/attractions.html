{% extends "admin/base.html" %}
{% block title %}景点管理{% endblock %}

{% block content %}
<div class="admin-header">
    <div>
        <div class="admin-page-title">🏔️ 景点管理</div>
        <div class="admin-breadcrumb"><a href="/admin/">首页</a> / 景点管理</div>
    </div>
    <div style="display:flex;gap:var(--space-2);">
        <input type="text" class="form-input" id="searchInput" placeholder="搜索景点名称..." style="width:220px;">
        <button class="btn btn-primary" onclick="openModal()">+ 添加景点</button>
    </div>
</div>

<div class="table-card">
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>名称</th>
                <th>分类</th>
                <th>地址</th>
                <th>票价</th>
                <th>评分</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div class="table-footer">
        <span id="countInfo">加载中...</span>
    </div>
</div>

<!-- 编辑模态框 -->
<div class="admin-modal-overlay" id="modalOverlay">
    <div class="admin-modal">
        <div class="admin-modal-header">
            <div class="admin-modal-title" id="modalTitle">添加景点</div>
            <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button>
        </div>
        <div class="admin-modal-body">
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">景点名称 *</label>
                    <input type="text" class="form-input" id="fName" placeholder="如：黄果树瀑布">
                </div>
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select class="form-input" id="fCategory">
                        <option>自然风光</option><option>人文景观</option><option>红色旅游</option>
                        <option>特色体验</option><option>休闲娱乐</option><option>美食体验</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">地址</label>
                    <input type="text" class="form-input" id="fAddress" placeholder="贵州省安顺市...">
                </div>
                <div class="form-group">
                    <label class="form-label">票价</label>
                    <input type="text" class="form-input" id="fPrice" placeholder="160元 / 免费">
                </div>
                <div class="form-group">
                    <label class="form-label">评分</label>
                    <input type="number" class="form-input" id="fRating" min="0" max="5" step="0.1" placeholder="4.5">
                </div>
                <div class="form-group">
                    <label class="form-label">开放时间</label>
                    <input type="text" class="form-input" id="fHours" placeholder="08:00-18:00">
                </div>
                <div class="form-group">
                    <label class="form-label">最佳季节</label>
                    <input type="text" class="form-input" id="fSeason" placeholder="4-10月">
                </div>
                <div class="form-group">
                    <label class="form-label">电话</label>
                    <input type="text" class="form-input" id="fPhone" placeholder="0851-xxxx">
                </div>
                <div class="form-group">
                    <label class="form-label">纬度</label>
                    <input type="number" class="form-input" id="fLat" step="0.0001" placeholder="26.0">
                </div>
                <div class="form-group">
                    <label class="form-label">经度</label>
                    <input type="number" class="form-input" id="fLng" step="0.0001" placeholder="106.0">
                </div>
                <div class="form-group full">
                    <label class="form-label">特色</label>
                    <input type="text" class="form-input" id="fFeatures" placeholder="喀斯特地貌, 瀑布群...">
                </div>
                <div class="form-group full">
                    <label class="form-label">交通</label>
                    <input type="text" class="form-input" id="fTransport" placeholder="贵阳乘高铁...">
                </div>
                <div class="form-group full">
                    <label class="form-label">描述</label>
                    <textarea class="form-input" id="fDesc" placeholder="景点简介..."></textarea>
                </div>
                <div class="form-group full">
                    <label class="form-label">游玩建议</label>
                    <textarea class="form-input" id="fTips" placeholder="建议穿舒适鞋子..."></textarea>
                </div>
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveAttraction()">保存</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var allData = [];

function loadData(){
    fetch('/admin/api/attractions').then(function(r){return r.json();}).then(function(data){
        allData = data;
        renderTable(data);
    });
}

function renderTable(data){
    document.getElementById('countInfo').textContent = '共 ' + data.length + ' 个景点';
    document.getElementById('tableBody').innerHTML = data.map(function(a){
        return '<tr>' +
            '<td>'+a.id+'</td>' +
            '<td class="col-name">'+esc(a.name)+'</td>' +
            '<td><span class="tag tag-primary" style="font-size:11px;padding:2px 8px;">'+esc(a.category)+'</span></td>' +
            '<td>'+esc((a.address||'').substring(0,20))+'</td>' +
            '<td>'+esc(a.ticket_price||'免费')+'</td>' +
            '<td>⭐'+(a.rating||'-')+'</td>' +
            '<td class="col-actions">' +
                '<button class="btn btn-ghost btn-sm" onclick="editAttraction('+a.id+')">✏️</button>' +
                '<button class="btn btn-ghost btn-sm" onclick="deleteAttraction('+a.id+',\''+esc(a.name)+'\')">🗑️</button>' +
            '</td></tr>';
    }).join('');
}

document.getElementById('searchInput').addEventListener('input', function(){
    var kw = this.value.trim().toLowerCase();
    if(!kw){renderTable(allData);return;}
    renderTable(allData.filter(function(a){return (a.name||'').toLowerCase().indexOf(kw)>=0;}));
});

function openModal(data){
    document.getElementById('modalTitle').textContent = data ? '编辑景点' : '添加景点';
    document.getElementById('editId').value = data ? data.id : '';
    document.getElementById('fName').value = data ? data.name||'' : '';
    document.getElementById('fCategory').value = data ? data.category||'自然风光' : '自然风光';
    document.getElementById('fAddress').value = data ? data.address||'' : '';
    document.getElementById('fPrice').value = data ? data.ticket_price||'' : '';
    document.getElementById('fRating').value = data ? data.rating||'' : '';
    document.getElementById('fHours').value = data ? data.opening_hours||'' : '';
    document.getElementById('fSeason').value = data ? data.best_season||'' : '';
    document.getElementById('fPhone').value = data ? data.phone||'' : '';
    document.getElementById('fLat').value = data ? data.latitude||'' : '';
    document.getElementById('fLng').value = data ? data.longitude||'' : '';
    document.getElementById('fFeatures').value = data ? data.features||'' : '';
    document.getElementById('fTransport').value = data ? data.transportation||'' : '';
    document.getElementById('fDesc').value = data ? data.description||'' : '';
    document.getElementById('fTips').value = data ? data.tips||'' : '';
    document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function editAttraction(id){
    var a = allData.find(function(x){return x.id===id;});
    if(a) openModal(a);
}

function saveAttraction(){
    var id = document.getElementById('editId').value;
    var body = {
        name: document.getElementById('fName').value,
        category: document.getElementById('fCategory').value,
        address: document.getElementById('fAddress').value,
        ticket_price: document.getElementById('fPrice').value,
        rating: parseFloat(document.getElementById('fRating').value) || 0,
        opening_hours: document.getElementById('fHours').value,
        best_season: document.getElementById('fSeason').value,
        phone: document.getElementById('fPhone').value,
        latitude: parseFloat(document.getElementById('fLat').value) || 0,
        longitude: parseFloat(document.getElementById('fLng').value) || 0,
        features: document.getElementById('fFeatures').value,
        transportation: document.getElementById('fTransport').value,
        description: document.getElementById('fDesc').value,
        tips: document.getElementById('fTips').value,
    };
    if(!body.name){alert('请输入景点名称');return;}
    var url = id ? '/admin/api/attractions/'+id : '/admin/api/attractions';
    var method = id ? 'PUT' : 'POST';
    fetch(url,{method:method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();}).then(function(d){
        if(d.error){alert(d.error);return;}
        closeModal();loadData();
    });
}

function deleteAttraction(id,name){
    if(!confirm('确定删除「'+name+'」？此操作不可恢复。'))return;
    fetch('/admin/api/attractions/'+id,{method:'DELETE'}).then(function(){loadData();});
}

function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
loadData();
</script>
{% endblock %}
