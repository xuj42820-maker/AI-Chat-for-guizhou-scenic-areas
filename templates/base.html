<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}贵州旅游景点智能问答助手{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    {% block head_extra %}{% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block page_style %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <a href="/" class="nav-brand">
            <div class="nav-brand-icon">🌄</div>
            <span>贵州旅游</span>
        </a>

        <div class="nav-links" id="navLinks">
            <a href="/" class="nav-link {% block nav_active_home %}{% endblock %}">首页</a>
            <a href="/attractions" class="nav-link {% block nav_active_attractions %}{% endblock %}">景点大全</a>
            <a href="/routes" class="nav-link {% block nav_active_routes %}{% endblock %}">路线推荐</a>
            <a href="/visualization" class="nav-link {% block nav_active_viz %}{% endblock %}">数据可视化</a>
            <a href="/map" class="nav-link {% block nav_active_map %}{% endblock %}">景点地图</a>
        </div>

        <div class="nav-actions">
            <button class="nav-mobile-toggle" id="mobileToggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">🌄 贵州旅游景点智能问答助手</div>
            <div class="footer-info">数据来源：多源爬虫整合 · 景点数：117个</div>
            <div class="footer-links">
                <a href="/" class="footer-link">首页</a>
                <a href="/attractions" class="footer-link">景点大全</a>
                <a href="/routes" class="footer-link">路线推荐</a>
                <a href="/visualization" class="footer-link">数据可视化</a>
                <a href="/map" class="footer-link">景点地图</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    {% block page_script %}{% endblock %}
</body>
</html>
